<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Ramkrushna Abhyasika</title>
    <!-- css -->
    <link rel="stylesheet" href="CSS/style.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 20px;

            background:
                radial-gradient(circle at top left,
                    #2563eb,
                    transparent 40%),

                radial-gradient(circle at bottom right,
                    #7c3aed,
                    transparent 40%),

                #0f172a;
        }

        .login-card {
            width: 100%;
            max-width: 400px;

            background: #ffffff;
            border-radius: 20px;

            padding: 35px 28px;

            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;

            padding: 10px 14px;
            margin-bottom: 15px;

            border-radius: 10px;

            background: rgba(37, 99, 235, 0.1);
            color: #2563eb;

            text-decoration: none;
            font-size: 14px;
            font-weight: 600;

            transition: 0.25s ease;
        }

        .back-btn:hover {
            background: rgba(37, 99, 235, 0.18);
            transform: translateX(-2px);
        }

        .login-card h1 {
            text-align: center;
            margin-bottom: 8px;
            color: #222;
        }

        .login-card p {
            text-align: center;
            color: #666;
            margin-bottom: 28px;
            font-size: 14px;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .field input {
            width: 100%;
            padding: 14px;

            border: 1px solid #dcdcdc;
            border-radius: 12px;

            font-size: 15px;
            outline: none;

            transition: 0.2s;
        }

        .field input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .submit-btn {
            width: 100%;
            border: none;

            background: #2563eb;
            color: white;

            padding: 14px;
            border-radius: 12px;

            font-size: 16px;
            font-weight: 600;

            cursor: pointer;
            transition: 0.2s;
        }

        .submit-btn:hover {
            background: #1e40af;
        }

        .extra-links {
            margin-top: 18px;

            display: flex;
            justify-content: space-between;

            gap: 10px;
            flex-wrap: wrap;
        }

        .extra-links a {
            text-decoration: none;
            font-size: 14px;
            color: #2563eb;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {

            .login-card {
                padding: 28px 20px;
            }

            .extra-links {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>
    <!-- Loader Animation -->
    <div id="loader" aria-hidden="true">
        <div class="loader-content">
            <span class="loader-logo">RA</span>
            <span class="loader-text">Preparing Your Study Space</span>
        </div>
    </div>

    <div class="login-card">

        <a href="index.html" class="back-btn">
            ← Back to Home
        </a>

        <h1>Login</h1>

        <p>
            Access your library account
        </p>

        <form>

            <div class="field">
                <label for="email">
                    User ID / Email
                </label>

                <input type="text" id="email" placeholder="Enter your email or user ID" required>
            </div>

            <div class="field">
                <label for="password">
                    Password
                </label>

                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="submit-btn">
                Login
            </button>

        </form>

        <div class="extra-links">

            <a href="#">
                Forgot Password?
            </a>

            <a href="#">
                New Registration
            </a>

        </div>

    </div>

    <script>
        window.addEventListener("load", () => {
            const loader = document.getElementById("loader");
            if (loader) {
                setTimeout(() => loader.classList.add("hide"), 500);
            }
        });
    </script>
</body>

</html>
